schema_version: 1
name: solayer
version: "0.1.0"
description: "Solana 上的硬件加速原生 Restaking 协议，质押 SOL 获得 sSOL 流动性再质押代币"
author:
  name: "skylavis-sky"
  github: "skylavis-sky"
category: defi-protocol
tags:
  - restaking
  - liquid-staking
  - ssol
  - solana
license: MIT

link: https://app.solayer.org

components:
